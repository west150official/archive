    <style>
        /* ==========================================
           Christian Theology Archive Total CSS (Apple Style)
        ========================================== */
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --sub: #6e6e73;
            --blue: #0071e3;
            --border: #d2d2d7;
            --shadow: 0 12px 35px rgba(0, 0, 0, .08);
            --radius: 28px;
            --transition: .35s ease;
        }

        body.dark {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --sub: #98989d;
            --border: #333333;
            --shadow: 0 12px 35px rgba(0, 0, 0, .5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, .72);
            border-bottom: 1px solid rgba(0, 0, 0, .05);
            z-index: 999;
        }

        body.dark .header {
            background: rgba(0, 0, 0, .72);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--blue);
        }

        #themeToggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: var(--card);
            color: var(--text);
            box-shadow: var(--shadow);
            transition: .3s;
            font-size: 18px;
        }

        #themeToggle:hover {
            transform: rotate(15deg) scale(1.05);
        }

        .right-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #menuToggle {
            display: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: var(--card);
            color: var(--text);
            box-shadow: var(--shadow);
            font-size: 18px;
            position: relative;
            z-index: 1001;
        }

        .mobile-nav {
            position: fixed;
            top: 64px;
            right: 20px;
            background: var(--card);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity .25s ease, transform .25s ease, visibility .25s;
            pointer-events: none;
            z-index: 1000;
        }

        .mobile-nav.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
        }

        .mobile-nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 12px 14px;
            border-radius: 10px;
            transition: background .2s;
        }

        .mobile-nav a:hover {
            background: rgba(0, 113, 227, .08);
            color: var(--blue);
        }

        /* Accessibility: focus states */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            color: var(--text);
            box-shadow: var(--shadow);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: opacity .3s ease, transform .3s ease, visibility .3s, background .3s;
            z-index: 900;
        }

        #backToTop.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #backToTop:hover {
            background: var(--blue);
            color: #fff;
            transform: translateY(-4px);
        }

        @media(max-width: 900px) {
            #backToTop {
                bottom: 24px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
        }

        /* Hero Header */
        .hero {
            padding-top: 130px;
            padding-bottom: 30px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(44px, 6.5vw, 84px);
            font-weight: 700;
            line-height: 1.05;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 21px;
            font-weight: 400;
            color: var(--sub);
            margin-bottom: 30px;
            letter-spacing: -.2px;
        }

        /* Search Section (Hero 바로 아래 중앙 배치) */
        .search-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px 20px;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            max-width: 650px;
            height: 56px;
            border: none;
            outline: none;
            border-radius: 999px;
            background: var(--card);
            color: var(--text);
            padding: 0 28px;
            font-size: 17px;
            box-shadow: var(--shadow);
            transition: .3s;
        }

        #searchInput:focus {
            box-shadow: 0 0 0 4px rgba(0, 113, 227, .2);
        }

        /* Tags */
        .tags {
            max-width: 1200px;
            margin: 20px auto 60px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 20px;
        }

        .tags button {
            border: none;
            background: var(--card);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: var(--shadow);
            transition: .25s;
        }

        .tags button:hover, .tags button.active {
            background: var(--blue);
            color: white;
            transform: translateY(-2px);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--sub);
            font-size: 17px;
            display: none;
        }

        /* Hero Featured Card */
        .hero-featured {
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        .hero-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hero-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .hero-card img {
            width: 100%;
            height: 100%;
            min-height: 380px;
            object-fit: cover;
            display: block;
            transition: transform .6s ease;
        }

        .hero-card:hover img {
            transform: scale(1.03);
        }

        .hero-card-content {
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .hero-badge {
            display: inline-block;
            align-self: flex-start;
            background: rgba(0, 113, 227, 0.1);
            color: var(--blue);
            font-weight: 600;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 16px;
        }

        .hero-card-content h2 {
            font-size: 36px;
            line-height: 1.2;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .hero-card-content p {
            font-size: 16px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .hero-card-content .date {
            font-size: 14px;
            color: var(--sub);
            opacity: 0.8;
        }

        /* Grid Cards Section */
        .featured {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px 100px;
        }

        .featured h2 {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -.5px;
            margin-bottom: 48px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform .35s, box-shadow .35s;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, .12);
        }

        .card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            transition: transform .5s;
        }

        .card:hover img {
            transform: scale(1.04);
        }

        .card-content {
            padding: 24px;
        }

        .category {
            color: var(--blue);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .card h3 {
            font-size: 22px;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card p {
            color: var(--sub);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card small {
            color: var(--sub);
            opacity: 0.7;
            font-size: 12px;
        }

        /* Contact Box */
        .contact-box {
            max-width: 1000px;
            margin: 40px auto 0;
            padding: 70px 40px;
            background: var(--card);
            border-radius: 32px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .contact-box h2 {
            font-size: 40px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .contact-box p {
            font-size: 18px;
            color: var(--sub);
            margin-bottom: 30px;
        }

        /* Button & Hover Fix */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            border-radius: 999px;
            background: var(--blue);
            color: white;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            transition: .3s;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 113, 227, .3);
        }

        /* Footer */
        footer {
            padding: 100px 20px 50px;
            text-align: center;
            background: var(--bg);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 28px;
            margin-bottom: 36px;
        }

        .footer-links a {
            color: var(--sub);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color .2s;
        }

        .footer-links a:hover {
            color: var(--blue);
        }

        .footer-divider {
            max-width: 1000px;
            margin: 0 auto 36px;
            border: none;
            border-top: 1px solid var(--border);
        }

        footer strong {
            display: block;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        footer div {
            margin: 4px 0;
            color: var(--sub);
            font-size: 14px;
        }

        .social {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 24px 0 20px;
        }

        .social a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            transition: .3s;
            box-shadow: var(--shadow);
        }

        .social a:hover {
            background: var(--blue);
            color: #fff;
            transform: translateY(-4px);
        }

        .social svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .footer-copyright {
            font-size: 12px;
            color: var(--sub);
            opacity: .7;
            margin-top: 20px !important;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            border-radius: var(--radius);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: modalUp 0.35s ease-out;
        }

        @keyframes modalUp {
            from { transform: translateY(30px) scale(0.95); }
            to { transform: translateY(0) scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        .modal-body img {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
        }

        .modal-text {
            padding: 35px;
        }

        .modal-text h2 {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .modal-text p {
            font-size: 18px;
            color: var(--sub);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        /* Scroll Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-up.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media(max-width: 900px) {
            .hero-card {
                grid-template-columns: 1fr;
            }
            .hero-card img {
                min-height: 250px;
            }
            .header {
                padding: 0 20px;
            }
            nav {
                display: none;
            }
            #menuToggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>

                <!-- Threads SVG Icon -->
                <svg viewBox="0 0 192 192">
                    <path d="M141.537 88.9883C140.71 88.5919 139.87 88.2104 139.019 87.8451C137.537 60.5382 122.616 44.005 97.5801 44.005C72.228 44.005 52.882 63.8562 52.882 96.2393C52.882 128.819 72.5188 148 97.5801 148C116.522 148 130.584 137.982 136.216 120.354C136.804 118.514 135.808 116.516 133.987 115.931C132.181 115.352 130.222 116.326 129.616 118.151C124.896 132.885 112.83 140.852 97.5801 140.852C77.4116 140.852 60.0302 124.636 60.0302 96.2393C60.0302 68.04 77.1066 51.1531 97.5801 51.1531C117.802 51.1531 129.988 64.218 131.782 85.0886C122.825 81.3323 111.968 79.5242 99.8827 80.1265C79.7432 81.129 65.6548 93.3075 66.6573 113.447C67.1472 123.31 73.1979 131.229 83.2798 133.805C93.4152 136.395 103.882 132.868 110.122 124.717C115.228 118.048 118.006 108.825 118.397 97.3591C124.524 99.9673 130.016 103.541 134.422 108.064C140.81 114.618 144.005 123.385 143.292 132.404C142.131 147.098 130.404 158.452 115.58 159.888C95.2711 161.855 75.312 153.275 63.666 137.525C51.6812 121.331 46.2238 100.122 48.3371 77.9407C51.1396 48.5132 73.8056 24.3292 103.111 20.089C134.809 15.5036 163.626 36.636 168.083 67.892C168.343 69.7153 169.987 70.9859 171.803 70.7259C173.619 70.4659 174.889 68.822 174.629 67.006C169.613 31.8488 137.199 8.08051 101.536 13.238C68.5833 17.999 43.081 45.1849 39.9298 78.2831C37.5528 103.226 43.708 127.1 57.2119 145.347C70.3204 163.063 92.7936 172.713 115.892 170.479C134.819 168.647 149.778 154.148 151.261 135.385C152.179 123.774 148.067 112.512 139.814 104.053C134.428 98.5298 127.818 94.2882 120.475 91.3912C120.279 80.6433 117.616 71.3926 112.502 64.7088C104.282 53.963 89.8407 48.5583 72.882 51.1531" fill-rule="evenodd"/>
                </svg>
            </a>
        </div>
        <p class="footer-copyright">© 2026 WEST150</p>
    </footer>

    <!-- Back to Top -->
    <button id="backToTop" aria-label="맨 위로 이동">↑</button>

    <!-- Card Modal -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Script -->
    <script>
        // 카드 데이터
        const cardsData = [
            {
                "id": 1,
                "title": "삼위일체",
                "category": "조직신학",
                "date": "2026.07.23",
                "tags": ["삼위일체", "조직신학"],
                "description": "삼위일체 교리에 대한 핵심 개념과 성경적 근거를 카드뉴스로 쉽게 정리했습니다.",
                "image": "https://images.unsplash.com/photo-1507692049790-de58290a4334?w=800&auto=format&fit=crop"
            },
            {
                "id": 2,
                "title": "창세기 개요",
                "category": "성경",
                "date": "2026.07.24",
                "tags": ["창세기", "구약"],
                "description": "창조부터 요셉의 이야기까지, 창세기의 전체적인 구조와 흐름을 한눈에 파악할 수 있습니다.",
                "image": "https://images.unsplash.com/photo-1455390582262-044cdead277a?w=800&auto=format&fit=crop"
            }
        ];

        // 다크모드 토글
        const themeToggle = document.getElementById("themeToggle");
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            themeToggle.textContent = "☀️";
        }

        themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            themeToggle.textContent = isDark ? "☀️" : "🌙";
        });

        // 내부 앵커 링크(#home, #archive, #contact 등)는 JS로 직접 스크롤 처리
        document.querySelectorAll('a[href^="#"]').forEach(link => {
            link.addEventListener("click", (e) => {
                const targetId = link.getAttribute("href").slice(1);
                const target = document.getElementById(targetId);
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: "smooth", block: "start" });
                }
            });
        });

        // 모바일 햄버거 메뉴 토글
        const menuToggle = document.getElementById("menuToggle");
        const mobileNav = document.getElementById("mobileNav");

        menuToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = mobileNav.classList.toggle("open");
            menuToggle.textContent = isOpen ? "✕" : "☰";
            menuToggle.setAttribute("aria-expanded", isOpen);
        });

        mobileNav.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", () => {
                mobileNav.classList.remove("open");
                menuToggle.textContent = "☰";
                menuToggle.setAttribute("aria-expanded", "false");
            });
        });

        document.addEventListener("click", (e) => {
            if (mobileNav.classList.contains("open") && !mobileNav.contains(e.target) && e.target !== menuToggle) {
                mobileNav.classList.remove("open");
                menuToggle.textContent = "☰";
                menuToggle.setAttribute("aria-expanded", "false");
            }
        });

        // 검색엔진용 구조화 데이터 (JSON-LD) 삽입
        function injectStructuredData(sortedCards) {
            const ld = {
                "@context": "https://schema.org",
                "@type": "Blog",
                "name": "Christian Theology Archive",
                "blogPost": sortedCards.map(card => ({
                    "@type": "BlogPosting",
                    "headline": card.title,
                    "description": card.description,
                    "image": card.image,
                    "datePublished": card.date.replaceAll(".", "-"),
                    "keywords": card.tags.join(", ")
                }))
            };
            const script = document.createElement("script");
            script.type = "application/ld+json";
            script.textContent = JSON.stringify(ld);
            document.head.appendChild(script);
        }

        // 렌더링
        function renderApp() {
            if (cardsData.length === 0) return;

            // 최신순 정렬 (날짜 기준)
            const sorted = [...cardsData].sort((a, b) => new Date(b.date.replaceAll(".", "-")) - new Date(a.date.replaceAll(".", "-")));

            // Hero 대형 카드 (가장 최신 글)
            const heroData = sorted[0];
            const heroFeatured = document.getElementById("heroFeatured");
            heroFeatured.innerHTML = `
                <div class="hero-card" onclick="openModal(${heroData.id})">
                    <img src="${heroData.image}" alt="${heroData.title}" loading="lazy" decoding="async">
                    <div class="hero-card-content">
                        <span class="hero-badge">Featured Archive</span>
                        <span class="category">${heroData.category}</span>
                        <h2>${heroData.title}</h2>
                        <p>${heroData.description}</p>
                        <span class="date">${heroData.date}</span>
                    </div>
                </div>
            `;

            // 그리드 카드 (hero에 쓰인 글은 제외해 중복 노출 방지)
            const grid = document.getElementById("cardGrid");
            grid.innerHTML = "";
            sorted.slice(1).forEach(card => {
                const tagsStr = card.tags.map(t => `#${t}`).join(" ");
                grid.innerHTML += `
                    <div class="card" onclick="openModal(${card.id})">
                        <img src="${card.image}" alt="${card.title}" loading="lazy" decoding="async">
                        <div class="card-content">
                            <span class="category">${card.category}</span>
                            <h3>${card.title}</h3>
                            <p>${card.description}</p>
                            <small>${card.date} · ${tagsStr}</small>
                        </div>
                    </div>
                `;
            });

            injectStructuredData(sorted);
        }

        // 모달 팝업
        const modal = document.getElementById("cardModal");
        const modalBody = document.getElementById("modalBody");
        const modalClose = document.getElementById("modalClose");

        function openModal(id) {
            const card = cardsData.find(item => item.id === id);
            if (!card) return;

            const tagsStr = card.tags.map(t => `#${t}`).join(" ");
            modalBody.innerHTML = `
                <img src="${card.image}" alt="${card.title}">
                <div class="modal-text">
                    <span class="category">${card.category}</span>
                    <h2>${card.title}</h2>
                    <p>${card.description}</p>
                    <small style="color:var(--sub);">${card.date} | ${tagsStr}</small>
                </div>
            `;
            modal.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        modalClose.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });

        function closeModal() {
            modal.classList.remove("show");
            document.body.style.overflow = "auto";
        }

        // 검색 및 태그 필터
        const searchInput = document.getElementById("searchInput");
        const noResults = document.getElementById("noResults");

        searchInput.addEventListener("input", function() {
            tagButtons.forEach(b => b.classList.remove("active"));
            showAllBtn.classList.add("active");
            filterCards(this.value.trim().toLowerCase());
        });

        const showAllBtn = document.getElementById("showAll");
        const tagButtons = document.querySelectorAll(".tags button");
        tagButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                tagButtons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                searchInput.value = "";
                const keyword = btn.innerText === "전체" ? "" : btn.innerText.replace("#", "").toLowerCase();
                filterCards(keyword);
            });
        });

        function filterCards(keyword) {
            const cards = document.querySelectorAll(".card-grid .card");
            let visibleCount = 0;
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                const isVisible = text.includes(keyword);
                card.style.display = isVisible ? "block" : "none";
                if (isVisible) visibleCount++;
            });
            noResults.style.display = (cards.length > 0 && visibleCount === 0) ? "block" : "none";
        }

        // Back to Top 버튼
        const backToTop = document.getElementById("backToTop");
        function toggleBackToTop() {
            if (window.scrollY > 150) {
                backToTop.classList.add("show");
            } else {
                backToTop.classList.remove("show");
            }
        }
        window.addEventListener("scroll", toggleBackToTop, { passive: true });
        toggleBackToTop();
        backToTop.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        // 스크롤 애니메이션
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll(".fade-up").forEach(el => observer.observe(el));

        renderApp();
    </script>
</body>
</html>
